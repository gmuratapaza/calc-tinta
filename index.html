<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a18; min-height: 100vh; padding: 1rem; }
.app { max-width: 480px; margin: 0 auto; }
header { display: flex; align-items: center; gap: 12px; padding: 1.25rem 0 1rem; }
header img { width: 52px; height: 52px; border-radius: 12px; }
header h1 { font-size: 22px; font-weight: 700; color: #1a1a18; }
header p { font-size: 12px; color: #888780; margin-top: 2px; }
.card { background: #fff; border-radius: 14px; padding: 1.25rem; margin-bottom: 12px; border: 0.5px solid #e0dfd8; }
.section-label { font-size: 11px; color: #888780; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
.product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.prod-btn { background: #f5f5f0; border: 1.5px solid transparent; border-radius: 10px; padding: 10px 12px; cursor: pointer; text-align: left; -webkit-tap-highlight-color: transparent; }
.prod-btn.active { background: #eaf3de; border-color: #639922; }
.prod-name { font-weight: 600; font-size: 13px; color: #1a1a18; }
.prod-btn.active .prod-name { color: #3b6d11; }
.prod-sub { font-size: 11px; color: #888780; margin-top: 2px; }
.field-group { margin-bottom: 12px; }
select, input[type=number] { width: 100%; padding: 10px 12px; font-size: 15px; border: 0.5px solid #d3d1c7; border-radius: 10px; background: #f5f5f0; color: #1a1a18; appearance: none; -webkit-appearance: none; outline: none; }
select:focus, input[type=number]:focus { border-color: #639922; background: #fff; }
.area-row { display: flex; align-items: center; gap: 8px; }
.area-row input { flex: 1; }
.area-row span { font-size: 15px; color: #888780; }
.results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.metric { background: #f5f5f0; border-radius: 10px; padding: 12px; text-align: center; }
.metric-label { font-size: 11px; color: #888780; margin-bottom: 4px; }
.metric-value { font-size: 20px; font-weight: 600; color: #1a1a18; }
.metric-unit { font-size: 12px; font-weight: 400; color: #888780; margin-left: 2px; }
.info-bar { background: #f5f5f0; border-radius: 10px; padding: 12px; font-size: 12px; color: #5f5e5a; line-height: 1.7; margin-top: 10px; }
.info-bar b { color: #1a1a18; font-weight: 600; }
.warning { background: #faeeda; border-radius: 10px; padding: 12px; font-size: 12px; color: #633806; line-height: 1.6; margin-top: 8px; }
footer { text-align: center; font-size: 11px; color: #b4b2a9; padding: 1rem 0 2rem; }
</style>
</head>

    <div>
      <h1>TintaCalc</h1>
      <p>Alessi — dados do fabricante</p>
    </div>
  </header>

  <div class="card">
    <p class="section-label">Produto</p>
    <div class="product-grid">
      <button class="prod-btn active" data-id="dupla">
        <div class="prod-name">Dupla Ação</div>
        <div class="prod-sub">Paredes int./ext.</div>
      </button>
      <button class="prod-btn" data-id="esmalte">
        <div class="prod-name">Esmalte Sintético</div>
        <div class="prod-sub">Madeiras e metais</div>
      </button>
      <button class="prod-btn" data-id="piso">
        <div class="prod-name">Acrílico Piso</div>
        <div class="prod-sub">Pisos cimentados</div>
      </button>
      <button class="prod-btn" data-id="superior">
        <div class="prod-name">Acrílico Superior</div>
        <div class="prod-sub">Super rendimento</div>
      </button>
    </div>
  </div>

  <div class="card">
    <div class="field-group">
      <p class="section-label">Ferramenta de aplicação</p>
      <select id="ferramenta"></select>
    </div>
    <div class="field-group">
      <p class="section-label">Tipo de superfície</p>
      <select id="superficie"></select>
    </div>
    <div class="field-group" style="margin-bottom:0">
      <p class="section-label">Área a pintar</p>
      <div class="area-row">
        <input type="number" id="area" value="50" min="1" step="1" inputmode="numeric">
        <span>m²</span>
      </div>
    </div>
  </div>

  <div class="card">
    <p class="section-label">Quantidade necessária</p>
    <div class="results-grid">
      <div class="metric">
        <div class="metric-label">Tinta pura</div>
        <div class="metric-value" id="r-tinta">—</div>
      </div>
      <div class="metric">
        <div class="metric-label" id="r-dil-label">Diluente</div>
        <div class="metric-value" id="r-diluente">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total</div>
        <div class="metric-value" id="r-total">—</div>
      </div>
    </div>
    <div id="infoBar" class="info-bar"></div>
    <div id="warnBar"></div>
  </div>

  <footer>Baseado nas fichas técnicas Alessi · alessi.ind.br</footer>
</div>

<script>
var PRODUCTS = {
  dupla: {
    rendimento: 6.1, diluente: "Água potável",
    ferramentas: [
      {label:"Rolo de lã", dilMin:0.20, dilMax:0.30},
      {label:"Pincel",     dilMin:0.20, dilMax:0.30},
      {label:"Pistola",    dilMin:0.30, dilMax:0.40}
    ],
    superficies: [
      {label:"Alvenaria / reboco / massa corrida", demoes:2},
      {label:"Concreto / fibrocimento / gesso",    demoes:2},
      {label:"Repintura sobre látex",              demoes:2}
    ],
    obs:"Rendimento ~6,1 m²/L · 3 demãos · NBR 14942"
  },
  esmalte: {
    rendimento: 20.8, diluente: "Aguarrás Alessi",
    ferramentas: [
      {label:"Rolo de espuma", dilMin:0.10, dilMax:0.10},
      {label:"Pincel",         dilMin:0.10, dilMax:0.10},
      {label:"Pistola",        dilMin:0.10, dilMax:0.10}
    ],
    superficies: [
      {label:"Metais / galvanizados / alumínio",  demoes:2},
      {label:"Madeira nova — 1ª demão",           demoes:1, dilOverride:0.15},
      {label:"Madeira nova — demãos seguintes",   demoes:1, dilOverride:0.10},
      {label:"Cerâmica não vitrificada",          demoes:2}
    ],
    obs:"Rendimento ~20,8 m²/L por demão · Nunca use thinner"
  },
  piso: {
    rendimento: 7.4, diluente: "Água potável",
    ferramentas: [
      {label:"Rolo de lã", dilMin:0.10, dilMax:0.20},
      {label:"Pincel",     dilMin:0.10, dilMax:0.20},
      {label:"Pistola",    dilMin:0.10, dilMax:0.20}
    ],
    superficies: [
      {label:"Piso cimentado (área selada)",      demoes:2},
      {label:"Piso cimentado (área não selada)",  demoes:2, dilOverride:0.30},
      {label:"Quadra / varanda / garagem",        demoes:2}
    ],
    obs:"Rendimento ~7,4 m²/L · Área não selada: 30% na 1ª demão"
  },
  superior: {
    rendimento: 7.7, diluente: "Água potável",
    ferramentas: [
      {label:"Rolo de lã", dilMin:0.20, dilMax:0.30},
      {label:"Pincel",     dilMin:0.20, dilMax:0.30},
      {label:"Pistola",    dilMin:0.30, dilMax:0.40}
    ],
    superficies: [
      {label:"Alvenaria / reboco / massa corrida", demoes:2},
      {label:"Concreto / fibrocimento / gesso",    demoes:2},
      {label:"Repintura sobre látex",              demoes:2}
    ],
    obs:"Rendimento ~7,7 m²/L · Super cobertura Premium"
  }
};

var currentId = "dupla";

function fmt(n) { return n.toFixed(2).replace(".", ","); }

function populateSelects() {
  var p = PRODUCTS[currentId];
  var fSel = document.getElementById("ferramenta");
  var sSel = document.getElementById("superficie");
  fSel.innerHTML = "";
  sSel.innerHTML = "";
  p.ferramentas.forEach(function(f, i) {
    var o = document.createElement("option");
    o.value = i; o.textContent = f.label;
    fSel.appendChild(o);
  });
  p.superficies.forEach(function(s, i) {
    var o = document.createElement("option");
    o.value = i; o.textContent = s.label;
    sSel.appendChild(o);
  });
}

function calc() {
  var p = PRODUCTS[currentId];
  var fi = parseInt(document.getElementById("ferramenta").value) || 0;
  var si = parseInt(document.getElementById("superficie").value) || 0;
  var area = parseFloat(document.getElementById("area").value) || 0;
  if (area <= 0) return;

  var ferr = p.ferramentas[fi];
  var surf = p.superficies[si];
  var demoes = surf.demoes || 2;
  var dilPct = (ferr.dilMin + ferr.dilMax) / 2;
  var dilUse = (surf.dilOverride !== undefined) ? surf.dilOverride : dilPct;

  var litrosTinta    = (area * demoes) / p.rendimento;
  var litrosDiluente = litrosTinta * dilUse;
  var litrosTotal    = litrosTinta + litrosDiluente;

  document.getElementById("r-tinta").textContent    = fmt(litrosTinta) + " L";
  document.getElementById("r-dil-label").textContent = p.diluente;
  document.getElementById("r-diluente").textContent = fmt(litrosDiluente) + " L";
  document.getElementById("r-total").textContent    = fmt(litrosTotal) + " L";

  var dilRange = (ferr.dilMin === ferr.dilMax)
    ? Math.round(ferr.dilMin*100) + "%"
    : Math.round(ferr.dilMin*100) + "–" + Math.round(ferr.dilMax*100) + "%";

  document.getElementById("infoBar").innerHTML =
    "<b>Diluição:</b> " + Math.round(dilUse*100) + "% (faixa: " + dilRange + ") &nbsp;·&nbsp; " +
    "<b>" + demoes + " demão" + (demoes > 1 ? "s" : "") + "</b> &nbsp;·&nbsp; " + p.obs;

  document.getElementById("warnBar").innerHTML = (currentId === "esmalte")
    ? "<div class=\"warning\"><b>⚠️ Atenção:</b> Use apenas Aguarrás Alessi. Thinner coagula o produto.</div>"
    : "";
}

document.querySelectorAll(".prod-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".prod-btn").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    currentId = btn.getAttribute("data-id");
    populateSelects();
    calc();
  });
});

document.getElementById("ferramenta").addEventListener("change", calc);
document.getElementById("superficie").addEventListener("change", calc);
document.getElementById("area").addEventListener("input", calc);

populateSelects();
calc();
</script>
</body>
</html>
